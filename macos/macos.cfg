# Option list for the Einstein Toolkit on macOS (Apple Silicon / arm64)
#
# Toolchain: Homebrew GCC 15 throughout. Do not mix in Apple clang:
# the AMReX library in ${ETKPATH}/amrex-lib is built with g++-15
# (GCC libstdc++ ABI), so Cactus C++ must use g++-15 as well.
#
# Libraries not installed via Homebrew (GSL, FFTW3, zlib,
# OpenSSL, ADIOS2, openPMD, Silo, ssht, yaml-cpp, BLAS/LAPACK) are
# left unset so the ExternalLibraries thorns build their bundled
# copies. Boost must come from Homebrew: the bundled Boost 1.55
# bootstrap does not compile with modern clang/gcc (implicit
# function declarations are errors now), and only header-only
# Boost.Math is used (CarpetX/Algo), so there is no ABI concern.

# Whenever this version string changes, the application is configured
# and rebuilt from scratch
VERSION = macos-arm64-gcc15-2026-07-12

CPP = cpp-15
CC = gcc-15
CXX = g++-15
FPP = cpp-15
FC = gfortran-15
F90 = gfortran-15

# -Wno-error=...: GCC 14+ turned these legacy-C diagnostics into hard
#   errors; the bundled Silo 4.11.1 (hsize_t* vs int*) needs them to be
#   warnings again.
# -DHDmemcmp=memcmp: Silo's H5FDsilo.c uses this HDF5-1.x-internal macro,
#   which HDF5 2.x removed; Silo defines fallbacks for every HD* macro
#   except this one.
CFLAGS = -g -mcpu=native -pipe -std=gnu11 -Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types -DHDmemcmp=memcmp
# -D_Static_assert=static_assert: the macOS 26 SDK mach headers use the
#   C11 keyword _Static_assert at file scope, which g++ does not accept
#   in C++ (clang-only extension).
# -D_DARWIN_C_SOURCE: keep quick_exit/at_quick_exit & friends visible
#   even when a source file defines _POSIX_C_SOURCE (NSIMD's memory.cpp
#   does), since libstdc++'s <cstdlib> expects them unconditionally.
CXXFLAGS = -g -mcpu=native -pipe -std=gnu++20 -D_Static_assert=static_assert -D_DARWIN_C_SOURCE
FPPFLAGS = -traditional
F90FLAGS = -g -mcpu=native -pipe -fcray-pointer -ffixed-line-length-none -finit-character=65 -finit-integer=42424242 -finit-real=nan
# -no_warn_duplicate_libraries: Cactus repeats -lz (HDF5's detect.sh adds
#   z twice, the zlib thorn once); harmless, but Xcode 15+ ld warns.
# -lblosc2: the bundled (static) ADIOS2 picks up Homebrew's c-blosc2 for
#   checkpoint compression, so the final link needs the dylib. Requires
#   `brew install c-blosc2`.
LDFLAGS = -Wl,-rpath,/opt/homebrew/lib -Wl,-no_warn_duplicate_libraries -L/opt/homebrew/opt/c-blosc2/lib -lblosc2

C_LINE_DIRECTIVES = yes
F_LINE_DIRECTIVES = yes

INTEGER_PRECISION = 4
REAL_PRECISION = 8

DEBUG = no
CPP_DEBUG_FLAGS = -DCARPET_DEBUG
C_DEBUG_FLAGS = -fbounds-check -fsanitize=undefined -fstack-protector-all -ftrapv
CXX_DEBUG_FLAGS = -fbounds-check -fsanitize=undefined -fstack-protector-all -ftrapv
FPP_DEBUG_FLAGS = -DCARPET_DEBUG
F90_DEBUG_FLAGS = -fcheck=bounds,do,mem,pointer,recursion -fsanitize=undefined -fstack-protector-all -ftrapv

OPTIMISE = yes
C_OPTIMISE_FLAGS = -O3 -fcx-limited-range -fexcess-precision=fast -ffp-contract=fast -fno-math-errno -fno-rounding-math -fno-signaling-nans
CXX_OPTIMISE_FLAGS = -O3 -fcx-limited-range -fexcess-precision=fast -ffp-contract=fast -fno-math-errno -fno-rounding-math -fno-signaling-nans
F90_OPTIMISE_FLAGS = -O3 -fcx-limited-range -fexcess-precision=fast -ffp-contract=fast -fno-math-errno -fno-rounding-math -fno-signaling-nans

OPENMP = yes
CPP_OPENMP_FLAGS = -fopenmp
FPP_OPENMP_FLAGS = -D_OPENMP
C_OPENMP_FLAGS   = -fopenmp
CXX_OPENMP_FLAGS = -fopenmp
F90_OPENMP_FLAGS = -fopenmp
LD_OPENMP_FLAGS = -fopenmp

WARN = yes
CPP_WARN_FLAGS = -Wall
C_WARN_FLAGS =
CXX_WARN_FLAGS =
FPP_WARN_FLAGS = -Wall
F90_WARN_FLAGS = -Wall -Wshadow -Wsurprising

AMREX_DIR = ${ETKPATH}/amrex-lib

BOOST_DIR = /opt/homebrew/opt/boost
# boost_system has been header-only for years and Boost 1.90 no longer
# ships even the stub library; the thorn's default of
# "boost_filesystem boost_system" therefore fails to link.
BOOST_LIBS = boost_filesystem

HDF5_DIR = /opt/homebrew/opt/hdf5
HDF5_ENABLE_CXX = yes
HDF5_ENABLE_FORTRAN = yes
# Setting INC_DIRS/LIB_DIRS/LIBS explicitly skips the thorn's detection,
# including its "h5cc -show" fallback, which parses the same Cellar lib
# directory out of h5cc's output three times (once from -L, once per
# absolute libhdf5*.a path) and so triplicates the -rpath entry on the
# link line ("ld: warning: duplicate -rpath ... ignored").
HDF5_INC_DIRS = /opt/homebrew/opt/hdf5/include
HDF5_LIB_DIRS = /opt/homebrew/opt/hdf5/lib
HDF5_LIBS = hdf5_hl_cpp hdf5_cpp hdf5_hl_fortran hdf5_fortran hdf5_hl hdf5
# Homebrew HDF5 is built with szip support from libaec; -lsz needs this path
LIBSZ_DIR = /opt/homebrew/opt/libaec/lib

HWLOC_DIR = /opt/homebrew/opt/hwloc
MPI_DIR = /opt/homebrew/opt/open-mpi

NSIMD_DIR = BUILD
NSIMD_SIMD = AARCH64

PTHREADS_DIR = NO_BUILD
