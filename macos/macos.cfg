# Option list for the Einstein Toolkit on macOS (Apple Silicon / arm64)
#
# Toolchain: Homebrew GCC 15 throughout. Do not mix in Apple clang:
# the AMReX library in ${ETKPATH}/amrex-lib is built with g++-15
# (GCC libstdc++ ABI), so Cactus C++ must use g++-15 as well.
#
# Libraries not installed via Homebrew (GSL, FFTW3, zlib,
# OpenSSL, ADIOS2, openPMD, Silo, ssht, yaml-cpp, BLAS/LAPACK) are
# left unset so the ExternalLibraries thorns build their bundled
# copies. Boost must come from Homebrew: the bundled Boost 1.55
# bootstrap does not compile with modern clang/gcc (implicit
# function declarations are errors now), and only header-only
# Boost.Math is used (CarpetX/Algo), so there is no ABI concern.

# Whenever this version string changes, the application is configured
# and rebuilt from scratch
VERSION = macos-arm64-gcc15-2026-07-12

CPP = cpp-15
CC = gcc-15
CXX = g++-15
FPP = cpp-15
FC = gfortran-15
F90 = gfortran-15

CFLAGS = -g -mcpu=native -pipe -std=gnu11
CXXFLAGS = -g -mcpu=native -pipe -std=gnu++20
FPPFLAGS = -traditional
F90FLAGS = -g -mcpu=native -pipe -fcray-pointer -ffixed-line-length-none -finit-character=65 -finit-integer=42424242 -finit-real=nan
LDFLAGS = -Wl,-rpath,/opt/homebrew/lib

C_LINE_DIRECTIVES = yes
F_LINE_DIRECTIVES = yes

INTEGER_PRECISION = 4
REAL_PRECISION = 8

DEBUG = no
CPP_DEBUG_FLAGS = -DCARPET_DEBUG
C_DEBUG_FLAGS = -fbounds-check -fsanitize=undefined -fstack-protector-all -ftrapv
CXX_DEBUG_FLAGS = -fbounds-check -fsanitize=undefined -fstack-protector-all -ftrapv
FPP_DEBUG_FLAGS = -DCARPET_DEBUG
F90_DEBUG_FLAGS = -fcheck=bounds,do,mem,pointer,recursion -fsanitize=undefined -fstack-protector-all -ftrapv

OPTIMISE = yes
C_OPTIMISE_FLAGS = -O3 -fcx-limited-range -fexcess-precision=fast -ffp-contract=fast -fno-math-errno -fno-rounding-math -fno-signaling-nans
CXX_OPTIMISE_FLAGS = -O3 -fcx-limited-range -fexcess-precision=fast -ffp-contract=fast -fno-math-errno -fno-rounding-math -fno-signaling-nans
F90_OPTIMISE_FLAGS = -O3 -fcx-limited-range -fexcess-precision=fast -ffp-contract=fast -fno-math-errno -fno-rounding-math -fno-signaling-nans

OPENMP = yes
CPP_OPENMP_FLAGS = -fopenmp
FPP_OPENMP_FLAGS = -D_OPENMP
C_OPENMP_FLAGS   = -fopenmp
CXX_OPENMP_FLAGS = -fopenmp
F90_OPENMP_FLAGS = -fopenmp
LD_OPENMP_FLAGS = -fopenmp

WARN = yes
CPP_WARN_FLAGS = -Wall
C_WARN_FLAGS =
CXX_WARN_FLAGS =
FPP_WARN_FLAGS = -Wall
F90_WARN_FLAGS = -Wall -Wshadow -Wsurprising

AMREX_DIR = ${ETKPATH}/amrex-lib

BOOST_DIR = /opt/homebrew/opt/boost

HDF5_DIR = /opt/homebrew/opt/hdf5
HDF5_ENABLE_CXX = yes
HDF5_ENABLE_FORTRAN = yes

HWLOC_DIR = /opt/homebrew/opt/hwloc
MPI_DIR = /opt/homebrew/opt/open-mpi

NSIMD_DIR = BUILD
NSIMD_SIMD = AARCH64

PTHREADS_DIR = NO_BUILD
